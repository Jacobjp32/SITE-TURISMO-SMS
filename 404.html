<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Página não encontrada | São Mateus do Sul</title>
    <link rel="icon" type="image/x-icon" href="images/logo_pin_turismo_3d.png">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--forest:#0a3d2e;--gold:#d4a574;--cream:#f8f6f0}
        body{
            font-family:'Raleway',sans-serif;
            background:linear-gradient(135deg,var(--forest) 0%,#062118 100%);
            min-height:100vh;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            color:white;text-align:center;padding:2rem;
        }
        .logo{width:70px;margin-bottom:1.5rem;opacity:.9}
        .code{
            font-family:'Cormorant Garamond',serif;
            font-size:7rem;font-weight:700;line-height:1;
            color:var(--gold);letter-spacing:-4px;
            text-shadow:0 0 40px rgba(212,165,116,.3);
        }
        h1{font-family:'Cormorant Garamond',serif;font-size:2rem;margin:.75rem 0 .5rem;opacity:.95}
        p{opacity:.78;font-size:1.05rem;max-width:480px;line-height:1.6;margin-bottom:2rem}
        .links{display:flex;gap:1rem;flex-wrap:wrap;justify-content:center;margin-bottom:3rem}
        .btn{
            padding:.8rem 1.8rem;border-radius:30px;text-decoration:none;
            font-weight:600;font-size:.95rem;transition:all .3s;
        }
        .btn-primary{background:var(--gold);color:var(--forest)}
        .btn-primary:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(212,165,116,.4)}
        .btn-ghost{border:2px solid rgba(255,255,255,.35);color:white}
        .btn-ghost:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.6)}
        .quick-links{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;opacity:.7;font-size:.9rem}
        .quick-links a{color:white;text-decoration:none;padding:.3rem .7rem;border-radius:20px;border:1px solid rgba(255,255,255,.2);transition:all .3s}
        .quick-links a:hover{background:rgba(255,255,255,.1);opacity:1}
        .deco{position:absolute;opacity:.04;font-size:18rem;pointer-events:none;user-select:none;top:50%;left:50%;transform:translate(-50%,-50%)}
        @media(max-width:500px){.code{font-size:5rem}.links{flex-direction:column;align-items:center}}
    </style>
</head>
<body>
    <span class="deco">🧉</span>
    <img src="images/logo_pin_turismo_3d.png" alt="São Mateus do Sul" class="logo">
    <div class="code">404</div>
    <h1>Página não encontrada</h1>
    <p>A página que você procura pode ter sido movida, renomeada ou não existe mais. Mas não se preocupe — ainda tem muito para descobrir em São Mateus do Sul!</p>
    <div class="links">
        <a href="index.html" class="btn btn-primary">🏠 Voltar ao Início</a>
        <a href="eventos.html" class="btn btn-ghost">📅 Ver Eventos</a>
        <a href="galeria.html" class="btn btn-ghost">📸 Galeria</a>
    </div>
    <div class="quick-links">
        <a href="o-que-fazer.html">O Que Fazer</a>
        <a href="sabores.html">Gastronomia</a>
        <a href="onde-ficar.html">Onde Ficar</a>
        <a href="reservas.html">Reservas</a>
        <a href="rotas-completas.html">Rotas</a>
    </div>
</body>
</html>
