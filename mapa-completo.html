<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com https://apis.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://vlibras.gov.br https://www.youtube.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob: https://*.tile.openstreetmap.org; frame-src https://www.google.com https://www.youtube.com https://turismo-sms.firebaseapp.com; connect-src 'self' https://turismo-sms-chatbot.jacobpimentel32.workers.dev https://graph.instagram.com https://www.google-analytics.com https://firestore.googleapis.com https://www.googleapis.com https://identitytoolkit.googleapis.com https://*.firebaseio.com https://*.tile.openstreetmap.org; media-src 'self' https:; object-src 'none'; base-uri 'self';">
    <script src="js/loading.js"></script>
    <script src="js/breadcrumbs.js"></script>
    <meta name="description" content="Mapa completo das rotas turísticas de São Mateus do Sul — explore a Capital Polonesa do Paraná com todos os pontos turísticos, culturais e gastronômicos.">
    <title>Mapa Completo - Rotas Turísticas São Mateus do Sul</title>

    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    <!-- Leaflet.js -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.css">
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.min.js"></script>

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/mapa-completo.css">
</head>
<body>
    <script src="js/nav-shared.js?v=4"></script>
    <script src="js/locais-data.js"></script>

    <!-- Mapa Leaflet (ocupa tela inteira abaixo da nav) -->
    <div id="leaflet-map"></div>

    <!-- Botão toggle para mobile -->
    <button class="toggle-panel-btn" id="toggleBtn" onclick="togglePanel()">📍 Legenda</button>

    <!-- Painel de Informações -->
    <div class="info-panel" id="infoPanel">
        <h1>📍 Mapa Completo</h1>
        <p id="totalLocais">Carregando locais...</p>

        <div class="legend">
            <div class="legend-item">
                <span class="legend-dot" style="background:#2d5016;"></span>
                <span>Erva-Mate</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background:#1565C0;"></span>
                <span>Turismo de Fé</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background:#dc143c;"></span>
                <span>Cultura Polonesa</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background:#0288D1;"></span>
                <span>Rota das Águas</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background:#d4a574;"></span>
                <span>Centro Histórico</span>
            </div>
            <div class="legend-item">
                <span class="legend-dot" style="background:#e65100;"></span>
                <span>Sabores</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <span>Total de Pins:</span>
                <span class="stat-number" id="statPins">—</span>
            </div>
            <div class="stat">
                <span>Rotas:</span>
                <span class="stat-number">6</span>
            </div>
        </div>
    </div>

    <!-- Botão Voltar (esquerda para não conflitar com chatbot) -->
    <a href="/" class="back-btn">← Voltar ao Site</a>

    <script>
    // ── Cores por palavra-chave de rota (igual ao rotas-completas) ──────
    var ROTA_CORES = {
        'erva-mate': '#2d5016', 'mate':      '#2d5016',
        'fe':        '#1565C0',
        'polonesa':  '#dc143c',
        'aguas':     '#0288D1', 'agua':      '#0288D1',
        'historico': '#b8863e', 'centro':    '#b8863e',
        'sabores':   '#e65100', 'memorias':  '#e65100',
        'terra':     '#6D4C41',
        'fluviopolis': '#7B1FA2',
        'eventos':   '#6a1b9a',
    };

    function getRotaColor(rota) {
        if (!rota) return '#0a3d2e';
        var r = rota.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
        for (var key in ROTA_CORES) {
            if (r.indexOf(key) !== -1) return ROTA_CORES[key];
        }
        return '#0a3d2e';
    }

    function makeDivIcon(color, sz) {
        sz = sz || 26;
        return L.divIcon({
            className: '',
            html: '<div class="marker-pin" style="background:' + color + ';width:' + sz + 'px;height:' + sz + 'px;"></div>',
            iconSize:   [sz, sz],
            iconAnchor: [sz / 2, sz],
            popupAnchor:[0, -sz]
        });
    }

    function buildPopup(local, color) {
        var endereco = local.endereco
            ? '<div class="map-popup-info">📍 ' + local.endereco + '</div>' : '';
        var horario  = local.horario
            ? '<div class="map-popup-info">🕐 ' + local.horario  + '</div>' : '';
        return '<div class="map-popup">'
            + '<div class="map-popup-header" style="background:' + color + '">'
            + '<p class="map-popup-name">'  + local.nome + '</p>'
            + '<p class="map-popup-route">' + (local.rota || '') + '</p>'
            + '</div>'
            + '<div class="map-popup-body">'
            + endereco + horario
            + '<a class="map-popup-link" href="/local?id=' + local.id
            + '" >Ver detalhes →</a>'
            + '</div></div>';
    }

    (function () {
        // ── Aguarda a nav renderizar com retry (nav-shared.js é async) ──
        var _retries = 0;

        function waitForNav() {
            var navEl = document.querySelector('nav') || document.querySelector('header');
            var navH  = navEl ? navEl.getBoundingClientRect().height : 0;

            if (navH < 10 && _retries < 40) {   // até ~2s (40 × 50ms)
                _retries++;
                setTimeout(waitForNav, 50);
                return;
            }

            applyNavOffset(navH || 70);  // 70px de fallback seguro
        }

        function applyNavOffset(navH) {
            var panel     = document.getElementById('infoPanel');
            var toggleBtn = document.getElementById('toggleBtn');
            var mapEl     = document.getElementById('leaflet-map');

            panel.style.top     = (navH + 14) + 'px';
            toggleBtn.style.top = (navH + 14) + 'px';
            mapEl.style.top     = navH + 'px';

            startLeaflet();
        }

        function startLeaflet() {
            // ── Inicializa mapa sem center fixo — usaremos fitBounds ───
            var map = L.map('leaflet-map', { zoomControl: true });

            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
                maxZoom: 19
            }).addTo(map);

            // Fallback enquanto fitBounds não executa
            map.setView([-25.88, -50.40], 12);

            // ── Adiciona markers ────────────────────────────────────────
            var locais = window.locaisData ? Object.values(window.locaisData) : [];
            var bounds = [];
            var count  = 0;

            locais.forEach(function (local) {
                if (!local.lat || !local.lng) return;

                var color  = getRotaColor(local.rota);
                var icon   = makeDivIcon(color);
                var popup  = buildPopup(local, color);

                L.marker([local.lat, local.lng], { icon: icon, title: local.nome })
                    .addTo(map)
                    .bindPopup(popup, { maxWidth: 260 });

                bounds.push([local.lat, local.lng]);
                count++;
            });

            // ── Ajusta zoom para mostrar todos os pins ─────────────────
            if (bounds.length > 0) {
                map.fitBounds(bounds, { padding: [55, 55], maxZoom: 14 });
            }

            document.getElementById('statPins').textContent = count;
            document.getElementById('totalLocais').textContent =
                count + ' estabelecimentos em 6 rotas turísticas';

            // Força redimensionamento após nav + painel renderizarem
            setTimeout(function () { map.invalidateSize(); }, 400);
        }

        // Garante que DOM + scripts carregaram antes de rodar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', waitForNav);
        } else {
            waitForNav();
        }
    })();

    function togglePanel() {
        var panel = document.getElementById('infoPanel');
        var btn   = document.getElementById('toggleBtn');
        panel.classList.toggle('collapsed');
        btn.textContent = panel.classList.contains('collapsed') ? '📍 Legenda' : '✕ Fechar';
    }
    </script>

    <script src="js/cookies.js"></script>
</body>
</html>
