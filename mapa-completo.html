<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta http-equiv="X-Frame-Options" content="SAMEORIGIN">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com https://apis.google.com https://cdn.jsdelivr.net https://vlibras.gov.br https://www.youtube.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob:; frame-src https://www.google.com https://www.youtube.com https://felt.com https://turismo-sms.firebaseapp.com; connect-src 'self' https://turismo-sms-chatbot.jacobpimentel32.workers.dev https://graph.instagram.com https://www.google-analytics.com https://firestore.googleapis.com https://www.googleapis.com https://identitytoolkit.googleapis.com https://*.firebaseio.com; media-src 'self' https:; object-src 'none'; base-uri 'self';">
    <script src="js/loading.js"></script>
    <meta name="description" content="Mapa completo das rotas turísticas de São Mateus do Sul — explore a Capital Polonesa do Paraná com todos os pontos turísticos, culturais e gastronômicos.">
    <title>Mapa Completo - Rotas Turísticas São Mateus do Sul</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Raleway:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/mapa-completo.css">
</head>
<body>
    <script src="js/nav-shared.js?v=4"></script>

    <!-- Felt Map Embed -->
    <iframe
        id="felt-map"
        title="Mapa Turístico - São Mateus do Sul"
        src="https://felt.com/embed/map/Getting-started-with-Felt-XXWOlvfeQvuVZbxeb89AWGB?loc=-25.87203%2C-50.38498%2C15z&legend=1&cooperativeGestures=1&link=1&geolocation=0&zoomControls=1&scaleBar=1"
        referrerpolicy="strict-origin-when-cross-origin"
        sandbox="allow-scripts allow-same-origin allow-popups"
        allowfullscreen>
    </iframe>

    <!-- Botão toggle para mobile -->
    <button class="toggle-panel-btn" id="toggleBtn" onclick="togglePanel()">📍 Legenda</button>

    <!-- Painel de Informações -->
    <div class="info-panel" id="infoPanel">
        <h1>📍 Mapa Completo</h1>
        <p>38 estabelecimentos mapeados em 6 rotas turísticas</p>
        
        <div class="legend">
            <div class="legend-item">
                <span class="legend-icon">🍓</span>
                <span>Sabores & Memórias</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🌿</span>
                <span>Erva-Mate</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">⛪</span>
                <span>Polonesa</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🌊</span>
                <span>Das Águas</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🏘️</span>
                <span>Fluviópolis</span>
            </div>
            <div class="legend-item">
                <span class="legend-icon">🌱</span>
                <span>Da Terra</span>
            </div>
        </div>

        <div class="stats">
            <div class="stat">
                <span>Total de Pins:</span>
                <span class="stat-number">38</span>
            </div>
            <div class="stat">
                <span>Localidades:</span>
                <span class="stat-number">15</span>
            </div>
            <div class="stat">
                <span>Rotas:</span>
                <span class="stat-number">6</span>
            </div>
        </div>
    </div>

    <a href="/" class="back-btn">← Voltar ao Site</a>

    <script>
        function togglePanel() {
            const panel = document.getElementById('infoPanel');
            const btn = document.getElementById('toggleBtn');
            panel.classList.toggle('collapsed');
            btn.textContent = panel.classList.contains('collapsed') ? '📍 Legenda' : '✕ Fechar';
        }
    </script>

</body>
</html>
