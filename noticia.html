<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://www.google-analytics.com https://www.gstatic.com https://apis.google.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com https://vlibras.gov.br https://www.youtube.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdn.jsdelivr.net; img-src 'self' data: https: blob: https://*.tile.openstreetmap.org; frame-src https://www.google.com https://www.youtube.com https://felt.com https://turismo-sms.firebaseapp.com; connect-src 'self' https://turismo-sms-chatbot.jacobpimentel32.workers.dev https://graph.instagram.com https://www.google-analytics.com https://firestore.googleapis.com https://www.googleapis.com https://identitytoolkit.googleapis.com https://*.firebaseio.com https://*.tile.openstreetmap.org; media-src 'self' https:; object-src 'none'; base-uri 'self';">
    <script src="js/loading.js"></script>
    <script src="js/breadcrumbs.js"></script>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPRT7FFFV8"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-YPRT7FFFV8');</script>
    <meta name="description" id="meta-description" content="Notícias do turismo em São Mateus do Sul">
    <link rel="canonical" id="meta-canonical" href="https://turismo.saomateusdosul.pr.gov.br/noticia">
    <meta property="og:url" id="og-url" content="https://turismo.saomateusdosul.pr.gov.br/noticia">
    <meta property="og:type" content="article">
    <link rel="icon" type="image/x-icon" href="images/logo_pin_turismo_3d.png">
    <title id="page-title">Notícia | São Mateus do Sul</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/noticia.css">
</head>
<body>
    <script src="js/nav-shared.js?v=4"></script>
    
    <article class="article-container" id="article-container"></article>
    
    <footer class="footer">
        <p>© 2026 Secretaria Municipal de Turismo de São Mateus do Sul</p>
        <p><a href="/noticias">← Voltar para Notícias</a></p>
    </footer>
    
    <script src="js/security-utils.js"></script>
    <script src="js/cms.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async function() {
            const SEC = window.SMSecurity;
            await CMS.init();
            const params = new URLSearchParams(window.location.search);
            const slug = params.get('slug');
            const container = document.getElementById('article-container');
            
            if (!slug) { mostrarNaoEncontrado(); return; }
            
            const post = CMS.getPostPorSlug(slug);
            if (!post) { mostrarNaoEncontrado(); return; }
            
            document.getElementById('page-title').textContent = SEC.value(post.titulo, 'Notícia') + ' | São Mateus do Sul';
            document.getElementById('meta-description').content = SEC.value(post.resumo, 'Notícias do turismo em São Mateus do Sul');
            const pageUrl = 'https://turismo.saomateusdosul.pr.gov.br/noticia?slug=' + slug;
            document.getElementById('meta-canonical').href = pageUrl;
            document.getElementById('og-url').content = pageUrl;
            
            container.innerHTML = `
                <a href="/noticias" class="back-link">← Voltar para Notícias</a>
                <header>
                    <span class="article-category">${SEC.html(post.categoria, 'Notícia')}</span>
                    <h1 class="article-title">${SEC.html(post.titulo, 'Sem título')}</h1>
                    <div class="article-meta">
                        <span>📅 ${CMS.formatarData(post.dataPublicacao)}</span>
                        <span>✍️ ${SEC.html(post.autor, 'Departamento de Turismo')}</span>
                    </div>
                </header>
                <img src="${SEC.url(post.imagem, 'images/FOTO_GERAL_SAO_MATEUS_DO_SUL.jpg')}" alt="${SEC.attr(post.titulo, 'Notícia')}" class="article-image" loading="lazy">
                <div class="article-content">
                    ${SEC.value(post.conteudo).split('\n\n').map(p => '<p>' + SEC.html(p) + '</p>').join('')}
                </div>
                <div class="article-share">
                    <h4>Compartilhar:</h4>
                    <div class="share-buttons">
                        <a href="https://wa.me/?text=${encodeURIComponent(SEC.value(post.titulo, 'Notícia') + ' - ' + window.location.href)}" target="_blank" rel="noopener noreferrer" class="share-btn whatsapp">📱 WhatsApp</a>
                        <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(window.location.href)}" target="_blank" rel="noopener noreferrer" class="share-btn facebook">📘 Facebook</a>
                    </div>
                </div>
            `;
        });
        
        function mostrarNaoEncontrado() {
            document.getElementById('article-container').innerHTML = `
                <div class="not-found">
                    <h2>😕 Notícia não encontrada</h2>
                    <p>A notícia que você procura não existe ou foi removida.</p>
                    <p style="margin-top: 2rem;"><a href="/noticias" class="back-link">← Voltar para Notícias</a></p>
                </div>
            `;
        }
    </script>
    <script src="translations.js"></script>
    <script src="js/cookies.js"></script>
</body>
</html>
