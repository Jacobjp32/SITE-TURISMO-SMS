        :root {

            --creme: #f9f7f4;
            --font-d: 'Cormorant Garamond', serif;

        }
        body { font-family: var(--font-b); background: var(--creme); color: #333; }

        .hero {
            position: relative;
            height: 55vh;
            min-height: 320px;
            overflow: hidden;
            background: var(--verde);
        }
        .hero img {
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.8s ease;
        }
        .hero:hover img { transform: scale(1.03); }
        .hero-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(10,61,46,0.92) 0%, rgba(10,61,46,0.3) 60%, transparent 100%);
        }
        .hero-content {
            position: absolute; bottom: 2rem; left: 2rem; right: 2rem;
            color: white;
        }
        .hero-badge {
            display: inline-block;
            background: var(--ouro);
            color: var(--verde);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.75rem;
        }
        .hero-title {
            font-family: var(--font-d);
            font-size: clamp(1.8rem, 5vw, 3.5rem);
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 0.4rem;
        }
        .hero-sub {
            font-size: 0.95rem;
            opacity: 0.85;
        }
        .btn-voltar {
            position: absolute; top: 1.25rem; left: 1.25rem;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            padding: 0.5rem 1.1rem;
            border-radius: 25px;
            font-family: var(--font-b);
            font-size: 0.82rem;
            font-weight: 600;
            text-decoration: none;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10;
        }
        .btn-voltar:hover { background: rgba(255,255,255,0.25); }

        /* ── LAYOUT PRINCIPAL ── */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 2.5rem;
            align-items: start;
        }
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; padding: 1.25rem 1rem; gap: 1.5rem; }
        }

        /* ── COLUNA ESQUERDA ── */
        .sec-label {
            display: inline-block;
            background: var(--verde);
            color: var(--ouro);
            padding: 0.3rem 1rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 1rem;
        }
        .sec-title {
            font-family: var(--font-d);
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            color: var(--verde);
            margin-bottom: 1rem;
            font-weight: 700;
        }
        .descricao { font-size: 1.05rem; line-height: 1.8; color: #444; margin-bottom: 2rem; }
        .historia-box {
            background: white;
            border-left: 4px solid var(--ouro);
            border-radius: 0 12px 12px 0;
            padding: 1.25rem 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .historia-box h3 {
            font-family: var(--font-d);
            color: var(--verde);
            font-size: 1.2rem;
            margin-bottom: 0.6rem;
        }
        .historia-box p { font-size: 0.95rem; line-height: 1.7; color: #555; }

        /* ── GALERIA ── */
        .galeria-section { margin-bottom: 2rem; }
        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.75rem;
            margin-top: 1rem;
        }
        .galeria-grid img {
            width: 100%; height: 130px;
            object-fit: cover;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .galeria-grid img:hover { transform: scale(1.03); box-shadow: 0 6px 20px rgba(0,0,0,0.18); }

        /* ── MAPA ── */
        .mapa-section { margin-bottom: 2rem; }
        #local-map {
            width: 100%; height: 260px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.12);
            margin-top: 1rem;
        }
        .btn-maps {
            display: block; width: 100%; text-align: center;
            background: var(--verde);
            color: white;
            padding: 0.9rem;
            border-radius: 10px;
            font-weight: 700;
            text-decoration: none;
            margin-top: 0.75rem;
            font-size: 0.9rem;
            transition: background 0.2s;

        .btn-maps:hover { background: var(--verde2); }

        .info-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
            overflow: hidden;
            position: sticky;
            top: 1rem;
        }
        .info-card-header {
            background: var(--verde);
            color: white;
            padding: 1.25rem 1.5rem;
        }
        .info-card-header h3 {
            font-family: var(--font-d);
            font-size: 1.3rem;
            margin-bottom: 0.25rem;

        .info-card-header p { font-size: 0.82rem; opacity: 0.8; }
        .info-list { padding: 1.25rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
        .info-row {
            display: flex; align-items: flex-start; gap: 0.85rem;

        .info-icon { font-size: 1.3rem; flex-shrink: 0; margin-top: 0.1rem; }
        .info-text strong { display: block; font-size: 0.75rem; color: #999; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 0.2rem; }
        .info-text span, .info-text a { font-size: 0.9rem; color: #333; line-height: 1.4; text-decoration: none; }
        .info-text a { color: var(--verde2); font-weight: 600; }
        .info-text a:hover { text-decoration: underline; }
        .info-card-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid #f0ede8;
            display: flex; flex-direction: column; gap: 0.6rem;
        }
        .btn-social {
            display: flex; align-items: center; gap: 0.6rem;
            padding: 0.7rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            transition: opacity 0.2s;

        .btn-social:hover { opacity: 0.82; }

        .btn-social.website { background: var(--verde); color: white; }
        .btn-social.phone { background: #25d366; color: white; }
        .tag-rota {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.35rem 0.85rem;
            background: rgba(10,61,46,0.08);
            color: var(--verde);
            border: 1px solid rgba(10,61,46,0.2);
            border-radius: 20px;
            font-size: 0.78rem;
            font-weight: 600;
            margin: 0 0.25rem 0.25rem 0;
        }

        /* ── LOCAIS RELACIONADOS ── */
        .relacionados { margin-top: 3rem; }
        .relacionados-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }
        .rel-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .rel-card:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.14); }
        .rel-card img { width: 100%; height: 120px; object-fit: cover; }
        .rel-card-body { padding: 0.85rem 1rem; }
        .rel-card-body h4 { font-family: var(--font-d); font-size: 1rem; color: var(--verde); margin-bottom: 0.2rem; }
        .rel-card-body p { font-size: 0.78rem; color: #777; }

        /* ── AÇÕES / CTAs ── */
        .local-actions {
            display: flex; flex-wrap: wrap; gap: 0.6rem;
            margin: 0 0 2rem;
        }
        .btn-acao {
            display: inline-flex; align-items: center; gap: 0.45rem;
            padding: 0.75rem 1.2rem;
            border-radius: 10px;
            font-family: var(--font-b);
            font-size: 0.9rem; font-weight: 700;
            text-decoration: none; cursor: pointer;
            border: 1px solid transparent;
            background: none;
            transition: background 0.2s, box-shadow 0.2s;
        }
        .btn-acao.primary { background: var(--verde); color: #fff; }
        .btn-acao.primary:hover { background: var(--verde2); }
        .btn-acao.ghost { background: #fff; color: var(--verde); border-color: rgba(10,61,46,0.25); }
        .btn-acao.ghost:hover { background: rgba(10,61,46,0.06); }
        .info-unavailable { color: #999; font-style: italic; }

        /* ── FOCO VISÍVEL (acessibilidade) ── */
        a:focus-visible, button:focus-visible,
        .btn-acao:focus-visible, .btn-voltar:focus-visible,
        .btn-maps:focus-visible, .btn-social:focus-visible,
        .rel-card:focus-visible, .galeria-grid img:focus-visible {
            outline: 3px solid var(--ouro);
            outline-offset: 2px;
            border-radius: 6px;
        }

        /* ── NOT FOUND ── */
        .not-found {
            text-align: center;
            padding: 5rem 2rem;
            max-width: 640px;
            margin: 0 auto;
        }
        .not-found h2 { font-family: var(--font-d); font-size: 2rem; color: var(--verde); margin-bottom: 1rem; }
        .not-found p { color: #666; margin-bottom: 2rem; }
        .not-found a { color: var(--verde2); font-weight: 600; }
        .not-found .local-actions { justify-content: center; }

        /* ── LIGHTBOX ── */
        .lb { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 9999; align-items: center; justify-content: center; }
        .lb.open { display: flex; }
        .lb img { max-width: 90vw; max-height: 85vh; border-radius: 8px; }
        .lb-close {
            position: absolute; top: 1rem; right: 1.5rem;
            color: white; font-size: 2rem; cursor: pointer;
            background: none; border: none;
        }

        /* ── FOOTER ── */
        footer { background: var(--verde); color: rgba(255,255,255,0.7); padding: 1.5rem; text-align: center; font-size: 0.82rem; margin-top: 3rem; }
        footer a { color: var(--ouro); text-decoration: none; }

    setMeta("og-url", "content", pageUrl);
    setMeta("og-image", "content", absUrl(local.imagem || FALLBACK_IMG));

    var heroImg = SEC.url(local.imagem, FALLBACK_IMG) || FALLBACK_IMG;

    // ── Galeria (opcional) ──
    var galeria = Array.isArray(local.galeria) ? local.galeria : [];
    var galeriaHTML = galeria.length
        ? '<section class="galeria-section">' +
            '<span class="sec-label">' + SEC.html(t("gallery")) + '</span>' +
            '<div class="galeria-grid">' +
                galeria.map(function (src, i) {
                    var safeSrc = SEC.url(src, FALLBACK_IMG) || FALLBACK_IMG;
                    var altTxt = nome + " — " + t("photo") + " " + (i + 1);
                    return '<img src="' + safeSrc + '" alt="' + SEC.attr(altTxt) + '" tabindex="0" ' +
                        'onclick="lbOpen(this.src, this.alt)" ' +
                        'onkeydown="if(event.key===\'Enter\'||event.key===\' \'){event.preventDefault();lbOpen(this.src,this.alt);}" ' +
                        'onerror="imgFallback(this)" loading="lazy">';
                }).join("") +
            '</div></section>'
        : "";

    // ── Coordenadas / mapa (não quebra se ausentes) ──
    var hasCoords = typeof local.lat === "number" && typeof local.lng === "number" &&
        isFinite(local.lat) && isFinite(local.lng);
    var coordQuery = hasCoords ? (local.lat + "," + local.lng) : "";
    // mapsUrl ausente + coordenadas presentes => mantém fallback por coordenadas (busca).
    var mapsViewUrl = SEC.value(local.mapsUrl, "") || (hasCoords ? "https://www.google.com/maps/search/?api=1&query=" + coordQuery : "");
    // "Traçar rota" = direções; usa coordenadas quando houver, senão mapsUrl.
    var directionsUrl = hasCoords
        ? "https://www.google.com/maps/dir/?api=1&destination=" + coordQuery
        : SEC.value(local.mapsUrl, "");

    var mapaHTML = hasCoords
        ? '<section class="mapa-section">' +
            '<span class="sec-label">' + SEC.html(t("location")) + '</span>' +
            '<div id="local-map"></div>' +
            (mapsViewUrl ? '<a href="' + SEC.url(mapsViewUrl, "#") + '" target="_blank" rel="noopener noreferrer" class="btn-maps">' + SEC.html(t("openMaps")) + '</a>' : "") +
           '</section>'
        : "";

    // ── Bloco de ações/CTAs (Traçar rota · Ver no mapa · Voltar ao mapa) ──
    var actionsHTML = '<div class="local-actions">' +
        (directionsUrl ? '<a class="btn-acao primary" href="' + SEC.url(directionsUrl, "#") + '" target="_blank" rel="noopener noreferrer">' + SEC.html(t("traceRoute")) + '</a>' : "") +
        '<a class="btn-acao ghost" href="/mapa-turistico.html">' + SEC.html(t("viewOnMap")) + '</a>' +
        '<a class="btn-acao ghost" href="/mapa-turistico.html" onclick="voltarAoMapa(event)">' + SEC.html(t("backToMap")) + '</a>' +
        '</div>';

    // ── Redes sociais / contato (só o que existir) ──
    var sociais = [];
    if (SEC.value(local.telefone, "")) {
        var telDigits = String(local.telefone).replace(/\D/g, "");
        sociais.push('<a class="btn-social phone" href="tel:' + telDigits + '">📞 ' + SEC.html(local.telefone) + '</a>');
    }
    if (SEC.value(local.instagram, "")) {
        var handle = String(local.instagram).replace("@", "");
        sociais.push('<a class="btn-social instagram" href="' + SEC.url("https://instagram.com/" + handle, "#") + '" target="_blank" rel="noopener noreferrer">📸 ' + SEC.html(local.instagram) + '</a>');
    }
    if (SEC.value(local.site, "")) {
        sociais.push('<a class="btn-social website" href="' + SEC.url(local.site, "#") + '" target="_blank" rel="noopener noreferrer">' + SEC.html(t("officialSite")) + '</a>');
    }

    // ── Tags de rota (guardado: rota pode faltar) ──
    var rotaTags = SEC.value(local.rota, "")
        ? String(local.rota).split("·").map(function (r) {
            return '<span class="tag-rota">' + SEC.html(r.trim()) + '</span>';
        }).join("")
        : '<span class="info-unavailable">' + SEC.html(t("unavailable")) + '</span>';

    // ── Relacionados (até 3, exceto o atual) ──
    var relacionados = Object.keys(window.locaisData)
        .filter(function (key) { return key !== id; })
        .slice(0, 3)
        .map(function (key) {
            var l = window.locaisData[key];
            var relImg = SEC.url(l.imagem, FALLBACK_IMG) || FALLBACK_IMG;
            return '<a href="/local?id=' + encodeURIComponent(l.id || key) + '" class="rel-card">' +
                '<img src="' + relImg + '" alt="' + SEC.attr(SEC.value(l.nome, "")) + '" onerror="imgFallback(this)" loading="lazy">' +
                '<div class="rel-card-body">' +
                    '<h4>' + SEC.html(l.nome, "") + '</h4>' +
                    '<p>' + SEC.html(l.subtitulo, "") + '</p>' +
                '</div>' +
            '</a>';
        }).join("");

    // ── Linhas do card de informações (oculta o que faltar) ──
    function infoRow(icon, label, valueHtml) {
        return '<div class="info-row"><span class="info-icon">' + icon + '</span>' +
            '<div class="info-text"><strong>' + SEC.html(label) + '</strong>' + valueHtml + '</div></div>';
    }
    var infoRows = "";
    if (SEC.value(local.endereco, "")) infoRows += infoRow("📍", t("address"), '<span>' + SEC.html(local.endereco) + '</span>');
    if (SEC.value(local.horario, "")) infoRows += infoRow("⏰", t("hours"), '<span>' + SEC.html(local.horario) + '</span>');
    if (SEC.value(local.telefone, "")) infoRows += infoRow("📞", t("phone"), '<a href="tel:' + String(local.telefone).replace(/\D/g, "") + '">' + SEC.html(local.telefone) + '</a>');
    if (SEC.value(local.acessibilidade, "")) infoRows += infoRow("♿", t("accessibility"), '<span>' + SEC.html(local.acessibilidade) + '</span>');
    infoRows += infoRow("🗺️", t("route"), '<div style="margin-top:0.3rem">' + rotaTags + '</div>');

    var badge = SEC.value(local.badge, "");
    var subtitulo = SEC.value(local.subtitulo, "");
    var categoria = SEC.value(local.categoria, "");

    root.innerHTML =
        '<div class="hero">' +
            '<img src="' + heroImg + '" alt="' + SEC.attr(nome) + '" id="hero-img" onerror="imgFallback(this)" loading="lazy">' +
            '<div class="hero-overlay"></div>' +
            '<a class="btn-voltar" href="/mapa-turistico.html" onclick="voltarAoMapa(event)">' + SEC.html(t("back")) + '</a>' +
            '<div class="hero-content">' +
                (badge ? '<div class="hero-badge">' + SEC.html(badge) + '</div>' : "") +
                '<h1 class="hero-title">' + SEC.html(nome) + '</h1>' +
                (subtitulo ? '<p class="hero-sub">' + SEC.html(subtitulo) + '</p>' : "") +
            '</div>' +
        '</div>' +

        '<div class="container">' +
            '<div class="col-left">' +
                '<span class="sec-label">' + SEC.html(t("about")) + '</span>' +
                '<h2 class="sec-title">' + SEC.html(nome) + '</h2>' +
                (descricao ? '<p class="descricao">' + SEC.html(descricao) + '</p>' : '<p class="descricao info-unavailable">' + SEC.html(t("unavailable")) + '</p>') +

                actionsHTML +

                (SEC.value(local.historia, "")
                    ? '<div class="historia-box"><h3>' + SEC.html(t("history")) + '</h3><p>' + SEC.html(local.historia) + '</p></div>'
                    : "") +

                galeriaHTML +
                mapaHTML +

                '<div class="relacionados">' +
                    '<span class="sec-label">' + SEC.html(t("alsoVisit")) + '</span>' +
                    '<div class="relacionados-grid">' + relacionados + '</div>' +
                '</div>' +
            '</div>' +

            '<div class="col-right">' +
                '<div class="info-card">' +
                    '<div class="info-card-header">' +
                        '<h3>' + SEC.html(t("info")) + '</h3>' +
                        (categoria ? '<p>' + SEC.html(categoria) + '</p>' : "") +
                    '</div>' +
                    '<div class="info-list">' + infoRows + '</div>' +
                    (sociais.length ? '<div class="info-card-footer">' + sociais.join("") + '</div>' : "") +
                '</div>' +
            '</div>' +
        '</div>' +

        '<footer>' +
            '<p>' + SEC.html(t("rights")) + '</p>' +
            '<p style="margin-top:.5rem"><a href="/">' + SEC.html(t("portal")) + '</a> · <a href="/mapa-turistico.html?grupo=roteiros">' + SEC.html(t("routes")) + '</a></p>' +
        '</footer>';

    // ── Mapa Leaflet (só com coordenadas válidas) ──
    if (hasCoords && window.L) {
        setTimeout(function () {
            try {
                var map = L.map("local-map", { center: [local.lat, local.lng], zoom: 15 });
                L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
                    attribution: "© OpenStreetMap",
                    maxZoom: 19
                }).addTo(map);
                L.marker([local.lat, local.lng])
                    .addTo(map)
                    .bindPopup("<strong>" + SEC.html(nome) + "</strong><br>" + SEC.html(SEC.value(local.endereco, "")))
                    .openPopup();
            } catch (e) {
                var mapEl = document.getElementById("local-map");
                if (mapEl) mapEl.style.display = "none";
            }
        }, 100);
    }
})();

// Fallback de imagem: troca por imagem segura e evita loop infinito.
function imgFallback(img) {
    if (img.dataset.fallbackApplied) return;
    img.dataset.fallbackApplied = "1";
    img.src = "images/FOTO_GERAL_SAO_MATEUS_DO_SUL.jpg";
}

// "Voltar ao mapa": usa histórico quando veio de outra página do site; senão vai ao mapa.
function voltarAoMapa(e) {
    if (e) e.preventDefault();
    if (window.history.length > 1 && document.referrer && document.referrer.indexOf(window.location.origin) === 0) {
        window.history.back();
    } else {
        window.location.href = "/mapa-turistico.html";
    }
}

// Lightbox simples
function lbOpen(src, alt) {
    document.getElementById("lb-img").src = src;
    document.getElementById("lb-img").alt = alt;
    document.getElementById("lb").classList.add("open");
    document.body.style.overflow = "hidden";
}
function lbClose() {
    document.getElementById("lb").classList.remove("open");
    document.body.style.overflow = "";
}
document.addEventListener("keydown", function (e) { if (e.key === "Escape") lbClose(); });
</script>
