    <script src="js/loading.js"></script>
    
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPRT7FFFV8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-YPRT7FFFV8');

    <!-- SEO -->
    <meta name="description" content="Reserve passeios, experiências e tours em São Mateus do Sul. Passeios de barco, gastronomia polonesa, turismo religioso e mais.">
    <meta name="keywords" content="reservas São Mateus do Sul, passeios turísticos, experiências Paraná, tour polonês">
    <link rel="canonical" href="https://turismo.saomateusdosul.pr.gov.br/reservas">
    
    <!-- Open Graph -->
    <meta property="og:title" content="Reservas | Experiências em São Mateus do Sul">
    <meta property="og:description" content="Reserve passeios únicos na Capital Polonesa do Paraná">
    <meta property="og:type" content="website">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/logo_pin_turismo_3d.png">
    
    <title>Reservas | São Mateus do Sul - Experiências Turísticas</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Scripts -->
    <script src="translations.js"></script>
    <script src="config.js"></script>
    
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/reservas.css">
</head>
<body>
    <script src="js/nav-shared.js?v=4"></script>
    
    <!-- Hero -->
    <section class="hero">
        <h1>🎫 Reserve Sua Experiência</h1>
        <p>Passeios únicos na Capital Polonesa do Paraná. Escolha, reserve e viva momentos inesquecíveis!</p>
    </section>
    
    <!-- Filtros -->
    <div class="filtros">
        <button class="filtro-btn active" data-filtro="todos">Todos</button>
        <button class="filtro-btn" data-filtro="Náutico">🚤 Náutico</button>
        <button class="filtro-btn" data-filtro="Cultural">🏛️ Cultural</button>
        <button class="filtro-btn" data-filtro="Gastronomia">🍽️ Gastronomia</button>
        <button class="filtro-btn" data-filtro="Religioso">⛪ Religioso</button>
        <button class="filtro-btn" data-filtro="Natureza">🌿 Natureza</button>
    </div>
    
    <!-- Main Content -->
    <main class="main-content">
        <div id="lista-experiencias">
            <!-- Experiências serão carregadas via JS -->
        </div>
    </main>
    
    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 Secretaria Municipal de Turismo de São Mateus do Sul</p>
        <p><a href="/">← Voltar para o Portal</a></p>
    </footer>
    
    <!-- Scripts -->
    <script src="js/reservas.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Renderizar experiências
            Reservas.renderizarLista('lista-experiencias');
            
            // Filtros
            const filtros = document.querySelectorAll('.filtro-btn');
            filtros.forEach(btn => {
                btn.addEventListener('click', function() {
                    filtros.forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    
                    const categoria = this.dataset.filtro;
                    const cards = document.querySelectorAll('.reserva-card');
                    
                    cards.forEach(card => {
                        const cardCategoria = card.querySelector('.reserva-categoria').textContent;
                        if (categoria === 'todos' || cardCategoria === categoria) {
                            card.style.display = '';
                        } else {
                            card.style.display = 'none';
                        }
                    });
                });
            });
        });
    </script>
</body>
</html>
