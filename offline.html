<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline | Turismo São Mateus do Sul</title>
    <link rel="icon" href="images/logo_pin_turismo_3d.png">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/offline.css">
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>Você está offline</h1>
        <p>Parece que você perdeu a conexão com a internet. Verifique sua conexão e tente novamente.</p>
        
        <button class="btn-retry" onclick="location.reload()">
            🔄 Tentar Novamente
        </button>
        
        <div class="tips">
            <h3>💡 Dica</h3>
            <p>Quando estiver online, as páginas que você visitar ficarão disponíveis offline!</p>
        </div>
    </div>
    
    <script>
        // Verificar conexão
        window.addEventListener('online', () => location.reload());
    </script>
</body>
</html>
