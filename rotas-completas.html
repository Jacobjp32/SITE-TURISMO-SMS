<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPRT7FFFV8"></script>
    <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-YPRT7FFFV8');</script>
    <!-- SEO -->
    <meta name="description" content="Explore mais de 50 estabelecimentos nas rotas turísticas de São Mateus do Sul. Rota do Mate, Polonesa, Das Águas e muito mais.">
    <meta name="keywords" content="rotas turísticas São Mateus, estabelecimentos turísticos, rota do mate, rota polonesa, turismo rural Paraná">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="Rotas Turísticas - São Mateus do Sul">
    <meta property="og:description" content="Mais de 50 estabelecimentos para descobrir nas rotas turísticas de São Mateus do Sul.">
    <meta property="og:image" content="https://saomateusdosul.tur.br/images/logo_pin_turismo.jpg">
    <title>Rotas Turísticas - São Mateus do Sul | Explore 50+ Estabelecimentos</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Raleway:wght@300;400;500;600;700;800&family=Libre+Baskerville:wght@400;700&display=swap" rel="stylesheet">

    <!-- Leaflet CSS (OpenStreetMap) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>

    <!-- Estilos locais -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/rotas-completas.css">

    <style>
        /* ── SEÇÃO DO MAPA ──────────────────────────────────── */
        .map-section {
            width: 100%;
            background: #0a3d2e;
        }
        .map-header {
            padding: 0.9rem 1.5rem 0.6rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.5rem;
        }
        .map-header-title {
            font-family: 'Cormorant Garamond', serif;
            color: #e8c9a0;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 0;
        }
        .map-toggle-btn {
            background: rgba(255,255,255,0.12);
            border: 1px solid rgba(232,201,160,0.4);
            color: #e8c9a0;
            padding: 0.35rem 0.9rem;
            border-radius: 20px;
            font-size: 0.78rem;
            font-family: 'Raleway', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .map-toggle-btn:hover { background: rgba(255,255,255,0.22); }

        #routeMap {
            width: 100%;
            height: 440px;
            transition: height 0.35s ease;
            border-bottom: 3px solid #d4a574;
        }
        #routeMap.map-collapsed { height: 0; overflow: hidden; }

        /* ── POPUP LEAFLET CUSTOMIZADO ──────────────────────── */
        .leaflet-popup-content-wrapper {
            border-radius: 10px !important;
            box-shadow: 0 4px 20px rgba(0,0,0,0.25) !important;
            padding: 0 !important;
            overflow: hidden;
        }
        .leaflet-popup-content { margin: 0 !important; width: 245px !important; }
        .map-popup { font-family: 'Raleway', sans-serif; }
        .map-popup-header { padding: 0.75rem 1rem 0.5rem; color: white; }
        .map-popup-name { font-size: 0.92rem; font-weight: 700; margin: 0 0 0.15rem; line-height: 1.3; }
        .map-popup-route { font-size: 0.72rem; opacity: 0.88; margin: 0; }
        .map-popup-body { padding: 0.6rem 1rem 0.8rem; background: #fff; }
        .map-popup-location { font-size: 0.78rem; color: #555; margin-bottom: 0.35rem; }
        .map-popup-phone { font-size: 0.78rem; color: #333; margin-bottom: 0.5rem; }
        .map-popup-gmaps {
            display: block; text-align: center;
            background: #1a5d43; color: white;
            padding: 0.45rem; border-radius: 6px;
            font-size: 0.78rem; font-weight: 600;
            text-decoration: none; transition: background 0.2s;
        }
        .map-popup-gmaps:hover { background: #0a3d2e; }

        /* ── MARCADORES ─────────────────────────────────────── */
        .marker-pin {
            border-radius: 50% 50% 50% 0;
            transform: rotate(-45deg);
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.35);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        /* ── DESTAQUE DO CARD ───────────────────────────────── */
        .establishment-card.map-active {
            outline: 3px solid #1a5d43;
            box-shadow: 0 0 0 4px rgba(26,93,67,0.18), 0 6px 24px rgba(0,0,0,0.14);
            transform: translateY(-2px);
        }

        /* ── BOTÃO "VER NO MAPA" NOS CARDS ─────────────────── */
        .map-card-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.75rem;
            padding: 0.4rem 1rem;
            border: none;
            border-radius: 20px;
            color: white;
            font-family: 'Raleway', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.15s;
        }
        .map-card-btn:hover { opacity: 0.82; transform: translateY(-1px); }

        @media (max-width: 768px) {
            #routeMap { height: 300px; }
        }
    </style>

    <script src="translations.js"></script>
</head>
<body>
    <script src="js/nav-shared.js"></script>

    <!-- HEADER -->
    <header class="header">
        <h2 class="header-title" data-lang-key="rotas-titulo">Rotas Turísticas</h2>
        <p class="header-subtitle">
            <span data-lang-key="rotas-subtitulo">Explore todos os estabelecimentos participantes das rotas turísticas de São Mateus do Sul</span>
        </p>
    </header>

    <!-- MAPA INTERATIVO -->
    <section class="map-section">
        <div class="map-header">
            <h3 class="map-header-title">🗺️ Mapa das Rotas</h3>
            <button class="map-toggle-btn" id="mapToggleBtn" onclick="toggleMap()">▲ Ocultar mapa</button>
        </div>
        <div id="routeMap"></div>
    </section>

    <!-- FILTROS -->
    <div class="filters">
        <div class="filters-container">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="🔍 Buscar por nome, localidade ou tipo de experiência..."
                    data-lang-key-placeholder="rotas-busca-ph"
                    oninput="filterEstablishments()"
                >
            </div>
            <div style="width:100%;margin-top:1rem;">
                <select id="locationFilter" onchange="filterByLocation()" style="width:100%;padding:0.55rem 1.2rem;border:2px solid #1a5d43;border-radius:50px;font-size:0.9rem;font-family:var(--font-body);background:white;cursor:pointer;">
                    <option value="all">📍 Todas as Localidades</option>
                    <option value="divisa">Localidade de Divisa</option>
                    <option value="fluviópolis">Localidade de Fluviópolis</option>
                    <option value="taquaral">Localidade de Taquaral / Colônia Taquaral</option>
                    <option value="água branca">Localidade da Água Branca</option>
                    <option value="espigãozinho">Localidade do Espigãozinho</option>
                    <option value="faxinal">Localidade do Faxinal do Ilhéus</option>
                    <option value="lajeadinho">Localidade do Lajeadinho</option>
                    <option value="são joaquim">Bairro São Joaquim</option>
                    <option value="centro">Centro</option>
                    <option value="iguaçu">Colônia Iguaçu</option>
                    <option value="potinga">Localidade da Barra do Potinga</option>
                    <option value="emboque">Localidade do Emboque</option>
                    <option value="cachoeira">Colônia Cachoeira</option>
                    <option value="vargem">Localidade da Vargem Grande</option>
                </select>
            </div>
            <div class="filter-buttons">
                <button class="filter-btn active" onclick="filterByRoute('all')">Todas</button>
                <button class="filter-btn" onclick="filterByRoute('sabores')">🍓 Sabores & Memórias</button>
                <button class="filter-btn" onclick="filterByRoute('mate')">🌿 Erva-Mate</button>
                <button class="filter-btn" onclick="filterByRoute('polonesa')">⛪ Polonesa</button>
                <button class="filter-btn" onclick="filterByRoute('aguas')">🌊 Das Águas</button>
                <button class="filter-btn" onclick="filterByRoute('fluviop')">🏘️ Fluviópolis</button>
                <button class="filter-btn" onclick="filterByRoute('terra')">🌱 Da Terra</button>
            </div>
        </div>
        <div class="results-count" id="resultsCount"></div>
    </div>

    <!-- LISTAGEM -->
    <main class="main" id="mainContent">
        <!-- gerado por JS -->
    </main>

    <a href="index.html" class="back-button" title="Voltar ao site">←</a>

    <!-- Leaflet JS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
    <!-- Dados centralizados dos empreendimentos -->
    <script src="js/rotas-data.js"></script>

    <script>
    // ─────────────────────────────────────────────
    // Estado global
    // ─────────────────────────────────────────────
    let currentFilter = 'all';
    let map = null;
    let markersMap = {};     // id → leaflet marker
    let mapCollapsed = false;

    // ─────────────────────────────────────────────
    // MAPA
    // ─────────────────────────────────────────────
    function initMap() {
        map = L.map('routeMap', {
            center: [-25.88, -50.42],
            zoom: 11
        });
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
            maxZoom: 19
        }).addTo(map);
        renderMarkers(establishments);
    }

    function makeIcon(route, highlighted) {
        const color = routeInfo[route] ? routeInfo[route].color : '#666';
        const sz = highlighted ? 34 : 26;
        return L.divIcon({
            className: '',
            html: `<div class="marker-pin" style="background:${color};width:${sz}px;height:${sz}px;${highlighted ? 'box-shadow:0 0 0 5px rgba(255,255,255,0.55),0 2px 12px rgba(0,0,0,0.5);transform:rotate(-45deg) scale(1.2);z-index:1000;' : ''}"></div>`,
            iconSize: [sz, sz],
            iconAnchor: [sz / 2, sz],
            popupAnchor: [0, -sz]
        });
    }

    function buildPopupHTML(est) {
        const color = routeInfo[est.route].color;
        const rName = routeInfo[est.route].icon + ' ' + routeInfo[est.route].name;
        const gmaps = est.mapsUrl || ('https://www.google.com/maps/search/?api=1&query=' + est.lat + ',' + est.lng);
        const phone = est.phone ? '<div class="map-popup-phone">📞 ' + est.phone + '</div>' : '';
        return '<div class="map-popup">'
            + '<div class="map-popup-header" style="background:' + color + '">'
            + '<p class="map-popup-name">' + est.name + '</p>'
            + '<p class="map-popup-route">' + rName + '</p>'
            + '</div>'
            + '<div class="map-popup-body">'
            + '<div class="map-popup-location">📍 ' + est.location + '</div>'
            + phone
            + '<a class="map-popup-gmaps" href="' + gmaps + '" target="_blank" rel="noopener">Abrir no Google Maps ↗</a>'
            + '</div></div>';
    }

    function renderMarkers(list) {
        Object.values(markersMap).forEach(m => m.remove());
        markersMap = {};
        const bounds = [];
        list.filter(e => e.lat !== null).forEach(est => {
            const marker = L.marker([est.lat, est.lng], {
                icon: makeIcon(est.route, false),
                title: est.name
            });
            marker.bindPopup(buildPopupHTML(est), { maxWidth: 260 });
            marker.on('click', () => highlightCard(est.id));
            marker.addTo(map);
            markersMap[est.id] = marker;
            bounds.push([est.lat, est.lng]);
        });
        if (bounds.length > 0) {
            map.fitBounds(bounds, { padding: [40, 40], maxZoom: 14 });
        }
    }

    function highlightMarker(id) {
        Object.entries(markersMap).forEach(([mid, m]) => {
            const est = establishments.find(e => e.id === mid);
            if (!est) return;
            m.setIcon(makeIcon(est.route, mid === id));
            m.setZIndexOffset(mid === id ? 1000 : 0);
        });
    }

    function highlightCard(id) {
        document.querySelectorAll('.establishment-card').forEach(c => c.classList.remove('map-active'));
        const card = document.querySelector('[data-est-id="' + id + '"]');
        if (card) {
            card.classList.add('map-active');
            card.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        highlightMarker(id);
    }

    function focusMarker(id) {
        const est = establishments.find(e => e.id === id);
        if (!est || est.lat === null) return;
        if (mapCollapsed) toggleMap();
        setTimeout(function() {
            map.setView([est.lat, est.lng], 15, { animate: true });
            if (markersMap[id]) markersMap[id].openPopup();
            highlightMarker(id);
            document.querySelector('.map-section').scrollIntoView({ behavior: 'smooth' });
        }, mapCollapsed ? 380 : 0);
    }

    function fitMapToVisible() {
        const visible = getVisible().filter(e => e.lat !== null);
        if (visible.length === 0) return;
        map.fitBounds(visible.map(e => [e.lat, e.lng]), { padding: [40, 40], maxZoom: 14 });
    }

    function toggleMap() {
        mapCollapsed = !mapCollapsed;
        document.getElementById('routeMap').classList.toggle('map-collapsed', mapCollapsed);
        document.getElementById('mapToggleBtn').textContent = mapCollapsed ? '▼ Mostrar mapa' : '▲ Ocultar mapa';
        if (!mapCollapsed) setTimeout(() => map.invalidateSize(), 380);
    }

    // ─────────────────────────────────────────────
    // RENDER DE CARDS
    // ─────────────────────────────────────────────
    function renderCard(est) {
        const route = routeInfo[est.route];
        const color = route.color;
        const mapsLink = est.mapsUrl
            ? '<a href="' + est.mapsUrl + '" target="_blank" rel="noopener" class="info-link" style="font-size:0.78rem;display:inline-block;margin-top:0.3rem;">📌 Ver no Google Maps</a>'
            : '';
        const phoneHtml = est.phone
            ? '<div class="info-item"><span class="info-icon">📞</span><div class="info-text"><strong>Contato</strong><a href="tel:' + est.phone.replace(/[^\d]/g,'') + '" class="info-link">' + est.phone + '</a></div></div>'
            : '';
        const socialHtml = est.social
            ? '<div class="info-item"><span class="info-icon">📱</span><div class="info-text"><strong>Redes Sociais</strong><a href="https://instagram.com/' + est.social.replace('@','') + '" target="_blank" rel="noopener" class="info-link">' + est.social + '</a></div></div>'
            : '';
        const mapBtn = est.lat !== null
            ? '<button class="map-card-btn" onclick="focusMarker(\'' + est.id + '\')" style="background:' + color + '">📍 Ver no mapa</button>'
            : '';
        const subtitle = est.subtitle
            ? '<p style="font-size:0.79rem;color:#777;font-style:italic;margin:-0.2rem 0 0.45rem;">' + est.subtitle + '</p>'
            : '';
        return '<div class="establishment-card" '
            + 'data-est-id="' + est.id + '" '
            + 'data-name="' + est.name.toLowerCase() + '" '
            + 'data-location="' + est.location.toLowerCase() + '" '
            + 'data-desc="' + est.desc.toLowerCase() + '" '
            + 'data-route="' + est.route + '">'
            + '<div class="establishment-header">'
            + '<h3 class="establishment-name">' + est.name + '</h3>'
            + '<span class="establishment-badge">' + route.icon + '</span>'
            + '</div>'
            + subtitle
            + '<p class="establishment-desc">' + est.desc + '</p>'
            + '<div class="establishment-info">'
            + (est.location ? '<div class="info-item"><span class="info-icon">📍</span><div class="info-text"><strong>Localização</strong>' + est.location + mapsLink + '</div></div>' : '')
            + phoneHtml
            + '<div class="info-item"><span class="info-icon">⏰</span><div class="info-text"><strong>Horário</strong>' + est.hours + '</div></div>'
            + socialHtml
            + '</div>'
            + mapBtn
            + '</div>';
    }

    function renderContent() {
        const main = document.getElementById('mainContent');
        if (!main) return;
        let html = '';
        if (currentFilter === 'all') {
            Object.keys(routeInfo).forEach(rKey => {
                const route = routeInfo[rKey];
                const items = establishments.filter(e => e.route === rKey);
                if (!items.length) return;
                html += '<section class="route-section" data-route="' + rKey + '">'
                    + '<div class="route-section-header">'
                    + '<span class="route-icon">' + route.icon + '</span>'
                    + '<h2 class="route-section-title">' + route.name + '</h2>'
                    + '</div>'
                    + '<div class="establishments-grid">'
                    + items.map(renderCard).join('')
                    + '</div></section>';
            });
        } else {
            const items = establishments.filter(e => e.route === currentFilter);
            const route = routeInfo[currentFilter];
            html = '<section class="route-section" data-route="' + currentFilter + '">'
                + '<div class="route-section-header">'
                + '<span class="route-icon">' + route.icon + '</span>'
                + '<h2 class="route-section-title">' + route.name + '</h2>'
                + '</div>'
                + '<div class="establishments-grid">'
                + items.map(renderCard).join('')
                + '</div></section>';
        }
        main.innerHTML = html;
        updateCount();
    }

    // ─────────────────────────────────────────────
    // FILTROS
    // ─────────────────────────────────────────────
    function getVisible() {
        const search = document.getElementById('searchInput').value.toLowerCase().trim();
        const loc = document.getElementById('locationFilter').value.toLowerCase();
        return establishments.filter(est => {
            const matchRoute = currentFilter === 'all' || est.route === currentFilter;
            const matchLoc = loc === 'all' || est.location.toLowerCase().includes(loc);
            const matchSearch = !search
                || est.name.toLowerCase().includes(search)
                || est.location.toLowerCase().includes(search)
                || est.desc.toLowerCase().includes(search);
            return matchRoute && matchLoc && matchSearch;
        });
    }

    function applyFilters() {
        const visible = getVisible();
        const visibleIds = new Set(visible.map(e => e.id));

        document.querySelectorAll('.establishment-card').forEach(card => {
            card.style.display = visibleIds.has(card.dataset.estId) ? '' : 'none';
        });
        document.querySelectorAll('.route-section').forEach(section => {
            const any = [...section.querySelectorAll('.establishment-card')].some(c => c.style.display !== 'none');
            section.style.display = any ? '' : 'none';
        });

        renderMarkers(visible);
        fitMapToVisible();
        updateCount(visible.length);
    }

    function filterByRoute(route) {
        currentFilter = route;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        const btn = document.querySelector('.filter-btn[onclick*="\'' + route + '\'"]');
        if (btn) btn.classList.add('active');
        document.getElementById('searchInput').value = '';
        renderContent();
        requestAnimationFrame(applyFilters);
    }

    function filterEstablishments() { applyFilters(); }
    function filterByLocation()     { applyFilters(); }

    function updateCount(n) {
        const count = n !== undefined ? n : getVisible().length;
        const el = document.getElementById('resultsCount');
        if (el) el.textContent = count + ' estabelecimento' + (count !== 1 ? 's' : '') + ' encontrado' + (count !== 1 ? 's' : '');
    }

    // ─────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────
    function init() {
        renderContent();
        initMap();
        const topBtn = document.getElementById('backToTop');
        if (topBtn) {
            window.addEventListener('scroll', () => topBtn.classList.toggle('visible', window.pageYOffset > 300));
            topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));
        }
    }

    document.readyState === 'loading'
        ? document.addEventListener('DOMContentLoaded', init)
        : init();
    </script>
</body>
</html>
