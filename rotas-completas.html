                'search.placeholder': '🔍 Szukaj według nazwy, lokalizacji lub rodzaju doświadczenia...',
                'filter.all': 'Wszystkie',
                'filter.sabores': '🍓 Smaki i Wspomnienia',
                'filter.mate': '🌿 Szlak Yerba Mate',
                'filter.polonesa': '⛪ Szlak Polski',
                'filter.aguas': '🌊 Szlak Wód',
                'filter.fluviop': '🏘️ Fluviópolis',
                'filter.terra': '🌱 Szlak Ziemi',
                'results': 'znaleziono obiekt(ów)',
                'location': 'Lokalizacja',
                'contact': 'Kontakt',
                'hours': 'Godziny',
                'social': 'Media Społecznościowe'
            }
        };

        let currentLanguage = 'pt-br';

        function translatePage(lang) {
            currentLanguage = lang;
            
            // Atualizar botões ativos
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(lang.split('-')[0])) {
                    btn.classList.add('active');
                }
            });

            // Traduzir elementos com data-i18n
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (rotasTranslations[lang] && rotasTranslations[lang][key]) {
                    if (el.tagName === 'INPUT') {
                        el.placeholder = rotasTranslations[lang][key];
                    } else {
                        el.textContent = rotasTranslations[lang][key];
                    }
                }
            });

            console.log('Idioma alterado para:', lang);
        }

        let currentFilter = 'all';
        let filteredData = [];

        
        // Filtro por localidade
        function filterByLocation() {
            const locationValue = document.getElementById('locationFilter').value.toLowerCase();
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const cards = document.querySelectorAll('.establishment-card');
            let visibleCount = 0;
            
            cards.forEach(card => {
                const location = card.dataset.location.toLowerCase();
                const name = card.dataset.name.toLowerCase();
                const desc = card.dataset.desc.toLowerCase();
                
                const matchesLocation = locationValue === 'all' || location.includes(locationValue);
                const matchesSearch = name.includes(searchTerm) || location.includes(searchTerm) || desc.includes(searchTerm);
                const matchesRoute = currentFilter === 'all' || card.closest('.route-section')?.dataset.route === currentFilter;
                
                if (matchesLocation && matchesSearch && matchesRoute) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Mostrar/ocultar seções
            document.querySelectorAll('.route-section').forEach(section => {
                const visibleCards = section.querySelectorAll('.establishment-card[style="display: block;"], .establishment-card:not([style])');
                if (visibleCards.length === 0) {
                    section.style.display = 'none';
                } else {
                    section.style.display = 'block';
                }
            });
            
            filteredData = Array.from(cards).filter(c => c.style.display !== 'none');
            updateResultsCount();
            
            if (visibleCount === 0) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="no-results">
                        <h2>Nenhum resultado encontrado</h2>
                        <p>Tente outra localidade ou termo de busca</p>
                    </div>
                `;
            }
        }

        // Initialize page
        function init() {
            console.log('🚀 Iniciando página de rotas...');
            console.log('📊 Estabelecimentos carregados:', establishments.length);
            console.log('🗺️ Rotas disponíveis:', Object.keys(routeInfo));
            renderContent();
            updateResultsCount();
            console.log('✅ Página inicializada com sucesso');
        }

        // Render content
        function renderContent() {
            const mainContent = document.getElementById('mainContent');
            console.log('🔄 Renderizando conteúdo, filtro atual:', currentFilter);
            
            if (!mainContent) {
                console.error('❌ mainContent não encontrado!');
                return;
            }
            
            if (currentFilter === 'all') {
                // Group by route
                let html = '';
                Object.keys(routeInfo).forEach(routeKey => {
                    const route = routeInfo[routeKey];
                    const items = establishments.filter(e => e.route === routeKey);
                    console.log(`  - ${routeKey}: ${items.length} itens`);
                    
                    if (items.length > 0) {
                        html += `
                            <section class="route-section" data-route="${routeKey}">
                                <div class="route-section-header">
                                    <span class="route-icon">${route.icon}</span>
                                    <h2 class="route-section-title">${route.name}</h2>
                                </div>
                                <div class="establishments-grid">
                                    ${items.map(est => renderCard(est)).join('')}
                                </div>
                            </section>
                        `;
                    }
                });
                mainContent.innerHTML = html;
            } else {
                // Show filtered results
                const items = establishments.filter(e => e.route === currentFilter);
                const route = routeInfo[currentFilter];
                
                mainContent.innerHTML = `
                    <section class="route-section">
                        <div class="route-section-header">
                            <span class="route-icon">${route.icon}</span>
                            <h2 class="route-section-title">${route.name}</h2>
                        </div>
                        <div class="establishments-grid">
                            ${items.map(est => renderCard(est)).join('')}
                        </div>
                    </section>
                `;
            }
            
            filteredData = establishments;
            updateResultsCount();
        }

        // Render establishment card
        function renderCard(est) {
            return `
                <div class="establishment-card" data-name="${est.name.toLowerCase()}" data-location="${est.location.toLowerCase()}" data-desc="${est.desc.toLowerCase()}">
                    <div class="establishment-header">
                        <h3 class="establishment-name">${est.name}</h3>
                        <span class="establishment-badge">${routeInfo[est.route].icon}</span>
                    </div>
                    <p class="establishment-desc">${est.desc}</p>
                    <div class="establishment-info">
                        ${est.location ? `
                            <div class="info-item">
                                <span class="info-icon">📍</span>
                                <div class="info-text">
                                    <strong>Localização</strong>
                                    ${est.location}
                                </div>
                            </div>
                        ` : ''}
                        <div class="info-item">
                            <span class="info-icon">📞</span>
                            <div class="info-text">
                                <strong>Contato</strong>
                                <a href="tel:${est.phone.replace(/[^\d]/g, '')}" class="info-link">${est.phone}</a>
                            </div>
                        </div>
                        <div class="info-item">
                            <span class="info-icon">⏰</span>
                            <div class="info-text">
                                <strong>Horário</strong>
                                ${est.hours}
                            </div>
                        </div>
                        ${est.social ? `
                            <div class="info-item">
                                <span class="info-icon">📱</span>
                                <div class="info-text">
                                    <strong>Redes Sociais</strong>
                                    <a href="https://instagram.com/${est.social.replace('@', '')}" target="_blank" class="info-link">${est.social}</a>
                                </div>
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }

        // Filter by route
        function filterByRoute(route) {
            currentFilter = route;
            
            // Update active button - match by data attribute
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            // Find button that matches the route
            const activeBtn = document.querySelector(`.filter-btn[onclick*="'${route}'"]`);
            if (activeBtn) activeBtn.classList.add('active');
            
            // Clear search
            document.getElementById('searchInput').value = '';
            
            renderContent();
        }

        // Filter by search
        function filterEstablishments() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const locationValue = document.getElementById('locationFilter').value.toLowerCase();
            const cards = document.querySelectorAll('.establishment-card');
            let visibleCount = 0;
            
            cards.forEach(card => {
                const name = card.dataset.name.toLowerCase();
                const location = card.dataset.location.toLowerCase();
                const desc = card.dataset.desc.toLowerCase();
                
                const matchesSearch = name.includes(searchTerm) || location.includes(searchTerm) || desc.includes(searchTerm);
                const matchesLocation = locationValue === 'all' || location.includes(locationValue);
                const matchesRoute = currentFilter === 'all' || card.closest('.route-section')?.dataset.route === currentFilter;
                
                if (matchesSearch && matchesLocation && matchesRoute) {
                    card.style.display = 'block';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            
            // Show/hide route sections
            document.querySelectorAll('.route-section').forEach(section => {
                const visibleCards = section.querySelectorAll('.establishment-card[style="display: block;"], .establishment-card:not([style])');
                if (searchTerm && visibleCards.length === 0) {
                    section.style.display = 'none';
                } else {
                    section.style.display = 'block';
                }
            });
            
            // Update count
            filteredData = Array.from(cards).filter(c => c.style.display !== 'none').map(c => ({ name: c.dataset.name }));
            updateResultsCount();
            
            // Show no results message
            if (visibleCount === 0) {
                document.getElementById('mainContent').innerHTML = `
                    <div class="no-results">
                        <h2>Nenhum resultado encontrado</h2>
                        <p>Tente buscar por outro termo</p>
                    </div>
                `;
            }
        }

        // Update results count
        function updateResultsCount() {
            const count = filteredData.length;
            const resultsCount = document.getElementById('resultsCount');
            if (resultsCount) {
                resultsCount.textContent = `${count} estabelecimento${count !== 1 ? 's' : ''} encontrado${count !== 1 ? 's' : ''}`;
            }
        }

        // Initialize on load - garantir que executa após DOM carregado
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                console.log('📄 DOM carregado, iniciando...');
                init();
            });
        } else {
            console.log('📄 DOM já carregado, iniciando imediatamente...');
            init();
        }
        
        // Também executar após window load como fallback
        window.addEventListener('load', function() {
            const mainContent = document.getElementById('mainContent');
            if (mainContent && (mainContent.innerHTML.trim() === '' || 
                mainContent.innerHTML.includes('Content will be generated'))) {
                console.log('⚠️ Fallback: conteúdo vazio, reinicializando...');
                init();
            }
        });
        
        // Fallback final após 1 segundo
        setTimeout(function() {
            const mainContent = document.getElementById('mainContent');
            if (mainContent && (mainContent.innerHTML.trim() === '' || 
                mainContent.innerHTML.includes('Content will be generated'))) {
                console.log('⚠️ Fallback 1s: reinicializando...');
                init();
            }
        }, 1000);
    </script>

</body>
</html>
