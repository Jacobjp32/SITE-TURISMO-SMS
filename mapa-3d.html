<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-YPRT7FFFV8"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-YPRT7FFFV8');
    </script>
    
    <!-- SEO -->
    <meta name="description" content="Explore São Mateus do Sul em um mapa 3D interativo. Descubra pontos turísticos, igrejas, restaurantes e atrações.">
    <meta name="keywords" content="mapa 3D São Mateus do Sul, pontos turísticos, mapa interativo">
    <link rel="canonical" href="https://turismo.saomateusdosul.pr.gov.br/mapa-3d">
    
    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="images/logo_pin_turismo_3d.png">
    
    <title>Mapa 3D | São Mateus do Sul - Explore a Cidade</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Raleway:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/mapa-3d.css">
</head>
<body>
    <!-- Loading -->
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Carregando mapa 3D...</p>
    </div>
    
    <script src="js/nav-shared.js?v=4"></script>
    
    <!-- Container do Mapa 3D -->
    <div id="mapa-3d-container"></div>
    
    <!-- Painel de Informações -->
    <div class="info-panel">
        <h2>🗺️ Mapa 3D Interativo</h2>
        <p>Explore São Mateus do Sul em 3D! Clique nos marcadores para ver informações sobre cada ponto turístico.</p>
        
        <div class="legenda">
            <div class="legenda-item">
                <div class="legenda-cor" style="background: #FF6B6B;"></div>
                <span>Turismo Religioso</span>
            </div>
            <div class="legenda-item">
                <div class="legenda-cor" style="background: #FFE66D;"></div>
                <span>Gastronomia</span>
            </div>
            <div class="legenda-item">
                <div class="legenda-cor" style="background: #95E1D3;"></div>
                <span>Cultural</span>
            </div>
            <div class="legenda-item">
                <div class="legenda-cor" style="background: #4ECDC4;"></div>
                <span>Lazer</span>
            </div>
            <div class="legenda-item">
                <div class="legenda-cor" style="background: #98D8C8;"></div>
                <span>Natureza</span>
            </div>
        </div>
    </div>
    
    <!-- Controles -->
    <div class="controles">
        <button class="controle-btn" onclick="resetarCamera()">🔄 Resetar Visão</button>
        <button class="controle-btn" onclick="toggleAutoRotate()">🔁 Auto Rotação</button>
        <a href="/mapa-completo" class="controle-btn">📍 Ver Mapa 2D</a>
    </div>
    
    <!-- Instruções -->
    <div class="instrucoes">
        <p>🖱️ <strong>Arrastar:</strong> Mover câmera</p>
        <p>🔍 <strong>Scroll:</strong> Zoom</p>
        <p>👆 <strong>Clique:</strong> Ver ponto</p>
    </div>
    
    <!-- Script do Mapa 3D -->
    <script src="js/mapa3d.js"></script>
    <script>
        let autoRotate = false;
        
        document.addEventListener('DOMContentLoaded', function() {
            // Inicializar mapa 3D
            Mapa3D.init('mapa-3d-container');
            
            // Esconder loading após 2 segundos
            setTimeout(function() {
                document.getElementById('loading').classList.add('hide');
            }, 2000);
        });
        
        function resetarCamera() {
            if (Mapa3D.camera) {
                Mapa3D.camera.position.set(0, 30, 40);
                Mapa3D.camera.lookAt(0, 0, 0);
            }
        }
        
        function toggleAutoRotate() {
            autoRotate = !autoRotate;
            if (autoRotate) {
                animarRotacao();
            }
        }
        
        function animarRotacao() {
            if (!autoRotate) return;
            
            const tempo = Date.now() * 0.0005;
            const raio = 50;
            
            Mapa3D.camera.position.x = Math.sin(tempo) * raio;
            Mapa3D.camera.position.z = Math.cos(tempo) * raio;
            Mapa3D.camera.lookAt(0, 0, 0);
            
            requestAnimationFrame(animarRotacao);
        }
    </script>
</body>
</html>
